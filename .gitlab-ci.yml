stages:
  - lint
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NODE_VERSION: "22"

default:
  image: python:3.11
  before_script:
    - pip install -e ".[dev]"

cache:
  paths:
    - .cache/pip
    - adapters/whatsapp/node_modules

lint:
  stage: lint
  script:
    - ruff check .
    - ruff format --check .

test:
  stage: test
  script:
    - pytest --cov=src/leRH --cov-report=term
  coverage: '/TOTAL.*\s+(\d+%)$/'

whatsapp-check:
  stage: test
  image: node:${NODE_VERSION}
  script:
    - cd adapters/whatsapp
    - npm install
    - npx tsc --noEmit
  only:
    changes:
      - adapters/whatsapp/**/*

build:
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--mtu=1460"]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_DRIVER: overlay2
    DOCKER_BUILDKIT: "1"
    DOCKERHUB_IMAGE: "abiyo27/lerh-api"
  before_script:
    - apk add --no-cache curl
    - docker version
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    - docker buildx create --use --name lerh-builder
  script:
    - docker buildx build --platform linux/arm64 -t "$DOCKERHUB_IMAGE:latest" -t "$DOCKERHUB_IMAGE:$CI_COMMIT_SHORT_SHA" --push .
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
